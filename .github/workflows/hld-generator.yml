name: HLD Generator

# ─────────────────────────────────────────────────────────────────────────────
# CONFIGURATION — to change the target branch, update TWO values:
#   (1) env.TARGET_BRANCH below   — used inside job steps
#   (2) on.pull_request.branches  — controls which merges trigger the workflow
#
# Note: GitHub Actions does not support env-var references inside the
# 'branches' trigger filter, so the branch name must appear in both places.
# The numbered comments (1) and (2) make it easy to find both locations.
#
# The other two env vars have no duplicate — update them in one place only.
# ─────────────────────────────────────────────────────────────────────────────
env:
  TARGET_BRANCH: main          # <-- (1) target branch — keep in sync with on.pull_request.branches
  WATCHED_FOLDER: docs         # <-- watched folder path
  HLD_OUTPUT: docs/HLD.md      # <-- output HLD path/file name

on:
  pull_request:
    types: [closed]
    branches:
      - main                   # <-- (2) keep in sync with env.TARGET_BRANCH above

jobs:
  generate-hld:
    # Only run when the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: detect whether the watched folder changed in this PR ──
      - name: Check if watched folder changed
        id: folder-check
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
                    | grep "^${{ env.WATCHED_FOLDER }}/" || true)
          if [ -n "$CHANGED" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "::notice::Folder '${{ env.WATCHED_FOLDER }}' changed — HLD generation triggered."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Folder '${{ env.WATCHED_FOLDER }}' did not change — skipping HLD generation."
          fi

      # ── Step 2: discover .md files in the watched folder ──
      - name: Find Markdown files
        if: steps.folder-check.outputs.changed == 'true'
        id: find-md
        run: |
          MD_FILES=$(find "${{ env.WATCHED_FOLDER }}" -name "*.md" | sort | tr '\n' ' ')
          if [ -n "$MD_FILES" ]; then
            echo "found=true"        >> "$GITHUB_OUTPUT"
            echo "files=$MD_FILES"   >> "$GITHUB_OUTPUT"
            echo "::notice::Markdown files found: $MD_FILES"
          else
            echo "found=false"       >> "$GITHUB_OUTPUT"
            echo "::warning::No Markdown files found in '${{ env.WATCHED_FOLDER }}'."
          fi

      # ── Step 3: generate the HLD document ──
      - name: Generate HLD
        if: >
          steps.folder-check.outputs.changed == 'true' &&
          steps.find-md.outputs.found == 'true'
        run: |
          chmod +x .github/scripts/generate-hld.sh
          .github/scripts/generate-hld.sh \
            "${{ env.WATCHED_FOLDER }}" \
            "${{ env.HLD_OUTPUT }}" \
            "${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.title }}"

      # ── Step 4: upload the HLD as a workflow artifact ──
      - name: Upload HLD artifact
        if: >
          steps.folder-check.outputs.changed == 'true' &&
          steps.find-md.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hld-document
          path: ${{ env.HLD_OUTPUT }}
          if-no-files-found: warn

      # ── Step 5 (optional): open a PR with the updated HLD ──
      # Uncomment this step if you want the workflow to commit and PR the HLD.
      #
      # - name: Open PR with generated HLD
      #   if: >
      #     steps.folder-check.outputs.changed == 'true' &&
      #     steps.find-md.outputs.found == 'true'
      #   uses: peter-evans/create-pull-request@v6
      #   with:
      #     commit-message: "docs: regenerate HLD from PR #${{ github.event.pull_request.number }}"
      #     branch: hld/auto-update-pr-${{ github.event.pull_request.number }}
      #     title: "docs: update HLD from PR #${{ github.event.pull_request.number }}"
      #     body: |
      #       Auto-generated HLD update triggered by PR #${{ github.event.pull_request.number }}
      #       merged into `${{ env.TARGET_BRANCH }}`.
      #     labels: documentation,automated
