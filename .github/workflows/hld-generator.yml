name: HLD Generator

# ─────────────────────────────────────────────────────────────────────────────
# CONFIGURATION — to change the target branch, update TWO values:
#   (1) env.TARGET_BRANCH below   — used inside job steps
#   (2) on.pull_request.branches  — controls which merges trigger the workflow
#
# Note: GitHub Actions does not support env-var references inside the
# 'branches' trigger filter, so the branch name must appear in both places.
# The numbered comments (1) and (2) make it easy to find both locations.
#
# The other two env vars have no duplicate — update them in one place only.
# ─────────────────────────────────────────────────────────────────────────────
env:
  TARGET_BRANCH: main                  # <-- (1) target branch — keep in sync with on.pull_request.branches
  WATCHED_FOLDER: doc/requirements     # <-- watched folder path (requirement Markdown files live here)
  HLD_OUTPUT_DIR: doc/hld             # <-- output directory for generated HLD files

on:
  pull_request:
    types: [closed]
    branches:
      - main                   # <-- (2) keep in sync with env.TARGET_BRANCH above

jobs:
  generate-hld:
    # Only run when the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── Step 1: detect whether the watched folder changed in this PR ──
      - name: Check if watched folder changed
        id: folder-check
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
                    | grep "^${{ env.WATCHED_FOLDER }}/" || true)
          if [ -n "$CHANGED" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "::notice::Folder '${{ env.WATCHED_FOLDER }}' changed — HLD generation triggered."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Folder '${{ env.WATCHED_FOLDER }}' did not change — skipping HLD generation."
          fi

      # ── Step 2: find only the .md files changed in this PR (exclude README) ──
      - name: Find changed Markdown files
        if: steps.folder-check.outputs.changed == 'true'
        id: find-md
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          MD_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
                     | grep "^${{ env.WATCHED_FOLDER }}/.*\.md$" \
                     | grep -iv "README\.md" \
                     | sort | tr '\n' ' ' | sed 's/ *$//' || true)
          if [ -n "$MD_FILES" ]; then
            echo "found=true"        >> "$GITHUB_OUTPUT"
            echo "files=$MD_FILES"   >> "$GITHUB_OUTPUT"
            echo "::notice::Requirement files changed: $MD_FILES"
          else
            echo "found=false"       >> "$GITHUB_OUTPUT"
            echo "::warning::No relevant Markdown files changed in '${{ env.WATCHED_FOLDER }}'."
          fi

      # ── Step 3: generate one HLD file per changed requirement file ──
      - name: Generate HLD files
        if: >
          steps.folder-check.outputs.changed == 'true' &&
          steps.find-md.outputs.found == 'true'
        run: |
          chmod +x .github/scripts/generate-hld.sh
          read -ra REQ_FILES <<< "${{ steps.find-md.outputs.files }}"
          .github/scripts/generate-hld.sh \
            "${{ env.HLD_OUTPUT_DIR }}" \
            "${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.title }}" \
            "${REQ_FILES[@]}"

      # ── Step 4: upload the generated HLD files as a workflow artifact ──
      - name: Upload HLD artifacts
        if: >
          steps.folder-check.outputs.changed == 'true' &&
          steps.find-md.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hld-documents
          path: ${{ env.HLD_OUTPUT_DIR }}/*-hld.md
          if-no-files-found: warn

      # ── Step 5: open a PR with the updated HLD files ──
      - name: Open PR with generated HLD files
        if: >
          steps.folder-check.outputs.changed == 'true' &&
          steps.find-md.outputs.found == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: regenerate HLD file(s) from PR #${{ github.event.pull_request.number }}"
          branch: hld/auto-update-pr-${{ github.event.pull_request.number }}
          title: "docs: update HLD file(s) from PR #${{ github.event.pull_request.number }}"
          body: |
            Auto-generated HLD update triggered by PR #${{ github.event.pull_request.number }}
            merged into `${{ env.TARGET_BRANCH }}`.

            **Source folder:** `${{ env.WATCHED_FOLDER }}`
            **Output directory:** `${{ env.HLD_OUTPUT_DIR }}`
            **Updated requirement files:** `${{ steps.find-md.outputs.files }}`

            Each changed requirement file generates a matching HLD file, e.g.:
            - `doc/requirements/payment-flow.md` → `doc/hld/payment-flow-hld.md`
          labels: documentation,automated
